<script>
let editId    = null;
let deleteId  = null;
let payMenyra = 'dore';
let sortCol   = 'data';
let sortDir   = 'desc';

function setSort(col){
  if(sortCol===col) sortDir = sortDir==='asc'?'desc':'asc';
  else { sortCol=col; sortDir=col==='data'?'desc':'asc'; }
  renderList();
}

function setMenyra(m){
  payMenyra = m;
  document.getElementById('btn-banke').className = 'status-btn' + (m==='banke' ? ' active-banke' : '');
  document.getElementById('btn-dore').className  = 'status-btn' + (m==='dore'  ? ' active-dore'  : '');
}

const ALL_KATS = ['Paga','Qira','Utilities','Transport','MirĂ«mbajtje','Marketing','Kosto Operative','TĂ« Tjera'];
const KAT_COLORS={'Paga':'#9b45d4','Qira':'#e07b30','Utilities':'#1a9e6e','Transport':'#1a7fc1',
  'MirĂ«mbajtje':'#c8003e','Marketing':'#4361ee','Kosto Operative':'#888','TĂ« Tjera':'#aaa'};
const KAT_ICONS={'Paga':'ri-group-line','Qira':'ri-building-line','Utilities':'ri-flashlight-line',
  'Transport':'ri-truck-line','MirĂ«mbajtje':'ri-tools-line','Marketing':'ri-megaphone-line',
  'Kosto Operative':'ri-settings-line','TĂ« Tjera':'ri-more-line'};

function hlSearch(text,q){
  if(!q) return esc(text);
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return esc(text);
  return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
}

/* ïżœ"?ïżœ"? Autocomplete: kategoria ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"? */
function onKatInput(q){
  const dd=document.getElementById('ac-kat-dd');
  const ql=q.toLowerCase().trim();

  /* Merge fixed list + used categories from history */
  const usedKats=[...new Set(DB.shpenzime.map(x=>x.kategoria).filter(Boolean))];
  const allKats=[...new Set([...ALL_KATS,...usedKats])];
  const matches=ql?allKats.filter(k=>k.toLowerCase().includes(ql)):allKats;

  if(!matches.length&&!ql){ dd.classList.remove('open'); return; }
  let html='<div class="ac-group">KategoritĂ«</div>';
  html+=matches.slice(0,10).map(k=>{
    const col=KAT_COLORS[k]||'#888';
    const ico=KAT_ICONS[k]||'ri-more-line';
    return `<div class="ac-opt" data-val="${esc(k)}">
      <i class="${ico}" style="color:${col};margin-right:7px"></i>${hlSearch(k,q)}
    </div>`;
  }).join('');

  if(ql&&!allKats.some(k=>k.toLowerCase()===ql)){
    html+=`<div class="ac-opt new-item" data-val="${esc(q)}">
      <i class="ri-add-circle-line" style="margin-right:6px"></i>Shto kategori "${esc(q)}"
    </div>`;
  }
  dd.innerHTML=html; dd.classList.add('open');

  dd.querySelectorAll('.ac-opt').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      e.preventDefault();
      document.getElementById('f-kat-input').value=el.dataset.val;
      dd.classList.remove('open');
    });
  });
}

/* ïżœ"?ïżœ"? Autocomplete: pĂ«rshkrimi nga historia ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"? */
function onPershkrimInput(q){
  const dd=document.getElementById('ac-pershkrim-dd');
  const ql=q.toLowerCase().trim();
  if(!ql){ dd.classList.remove('open'); return; }

  const prev=[...new Set(DB.shpenzime.map(x=>x.pershkrim).filter(Boolean))];
  const matches=prev.filter(p=>p.toLowerCase().includes(ql));
  if(!matches.length){ dd.classList.remove('open'); return; }

  let html='<div class="ac-group">Nga historia</div>';
  html+=matches.slice(0,6).map(p=>`<div class="ac-opt" data-val="${esc(p)}">${hlSearch(p,q)}</div>`).join('');
  dd.innerHTML=html; dd.classList.add('open');
  dd.querySelectorAll('.ac-opt').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      e.preventDefault();
      document.getElementById('f-pershkrim').value=el.dataset.val;
      dd.classList.remove('open');
    });
  });
}

/* ïżœ"?ïżœ"? Modal ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"? */
function openModal(){
  editId=null;
  document.getElementById('modal-title').textContent='Shpenzim i Ri';
  document.getElementById('f-shuma').value='';
  document.getElementById('f-shuma').style.color='var(--text)';
  document.getElementById('f-kat-input').value='';
  document.getElementById('f-pershkrim').value='';
  document.getElementById('f-data').value=todayISO();
  document.getElementById('f-notes').value='';
  setMenyra('dore');
  document.getElementById('modal-bd').classList.add('open');
  setTimeout(()=>document.getElementById('f-shuma').focus(),80);
}

function openEdit(id){
  const x=DB.shpenzime.find(s=>s.id===id); if(!x) return;
  editId=id;
  document.getElementById('modal-title').textContent='Edito Shpenzimin';
  document.getElementById('f-shuma').value=x.shuma||'';
  document.getElementById('f-shuma').style.color=x.shuma?'var(--accent)':'var(--text)';
  document.getElementById('f-kat-input').value=x.kategoria||'';
  document.getElementById('f-pershkrim').value=x.pershkrim||'';
  document.getElementById('f-data').value=x.data||'';
  document.getElementById('f-notes').value=x.notes||'';
  setMenyra(x.menyra_pages||'dore');
  document.getElementById('modal-bd').classList.add('open');
}

function closeModal(){ document.getElementById('modal-bd').classList.remove('open'); editId=null; }

function saveShpenzim(){
  const shuma=parseFloat(document.getElementById('f-shuma').value)||0;
  if(shuma<=0){ toast('ïżœsïżœ Vendos shumĂ«n â e vetmja e detyrueshme.'); document.getElementById('f-shuma').focus(); return; }

  const kategoria=document.getElementById('f-kat-input').value.trim()||'Pa kategori';
  const pershkrim=document.getElementById('f-pershkrim').value.trim();
  const data=document.getElementById('f-data').value||todayISO();
  const notes=document.getElementById('f-notes').value.trim();

  let list=DB.shpenzime;
  if(editId){
    const idx=list.findIndex(x=>x.id===editId);
    if(idx>=0) list[idx]={...list[idx],kategoria,data,pershkrim,shuma,menyra_pages:payMenyra,notes};
    toast('ïżœo" Shpenzimi u pĂ«rditĂ«sua.');
  } else {
    list.push({id:genId(),kategoria,data,pershkrim,shuma,menyra_pages:payMenyra,notes,created:new Date().toISOString()});
    toast('ïżœo" Shpenzimi u shtua.');
  }
  DB.shpenzime=list;
  closeModal(); renderStats(); renderList();
}

/* ïżœ"?ïżœ"? Stats ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"? */
function renderStats(){
  const all=DB.shpenzime;
  const now=new Date();
  const thisMonth=all.filter(x=>{const d=new Date(x.data);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const totalAll=all.reduce((s,x)=>s+(x.shuma||0),0);
  const totalMonth=thisMonth.reduce((s,x)=>s+(x.shuma||0),0);
  const bycat={}; all.forEach(x=>{bycat[x.kategoria]=(bycat[x.kategoria]||0)+(x.shuma||0);});
  const topCat=Object.entries(bycat).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stats-strip').innerHTML=`
    <div class="period-card"><div class="pc-header"><div class="pc-icon red"><i class="ri-wallet-3-line"></i></div><span class="pc-label">Ky Muaj</span></div><div class="pc-val red">${fmtL(totalMonth)}</div></div>
    <div class="period-card"><div class="pc-header"><div class="pc-icon blue"><i class="ri-calendar-line"></i></div><span class="pc-label">Totali Gjithsej</span></div><div class="pc-val">${fmtL(totalAll)}</div></div>
    <div class="period-card"><div class="pc-header"><div class="pc-icon orange"><i class="ri-bar-chart-line"></i></div><span class="pc-label">Nr. Shpenzimesh</span></div><div class="pc-val">${all.length}</div></div>
    <div class="period-card"><div class="pc-header"><div class="pc-icon green"><i class="ri-price-tag-3-line"></i></div><span class="pc-label">Kategoria Kryesore</span></div><div class="pc-val" style="font-size:14px">${topCat?esc(topCat[0]):'â'}</div></div>`;
}

/* ïżœ"?ïżœ"? List ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"?ïżœ"? */

function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  const kat=document.getElementById('filter-kat').value;
  const menyra=document.getElementById('filter-menyra').value;
  let list=DB.shpenzime.filter(x=>{
    if(kat&&x.kategoria!==kat) return false;
    if(menyra&&(x.menyra_pages||'dore')!==menyra) return false;
    if(!DP.matches(x.data)) return false;
    if(q&&!(x.pershkrim||'').toLowerCase().includes(q)&&!(x.kategoria||'').toLowerCase().includes(q)) return false;
    return true;
  });
  if(sortCol==='data')  list.sort((a,b)=>sortDir==='asc'?new Date(a.data)-new Date(b.data):new Date(b.data)-new Date(a.data));
  else if(sortCol==='pershkrim') list.sort((a,b)=>{const na=(a.pershkrim||'').toLowerCase(),nb=(b.pershkrim||'').toLowerCase();return sortDir==='asc'?na.localeCompare(nb):nb.localeCompare(na);});
  else if(sortCol==='shuma') list.sort((a,b)=>sortDir==='asc'?(a.shuma||0)-(b.shuma||0):(b.shuma||0)-(a.shuma||0));

  const total=list.reduce((s,x)=>s+(x.shuma||0),0);
  document.getElementById('list-total').textContent=`${list.length} rekorde Â· ${fmtL(total)}`;

  const wrap=document.getElementById('list-wrap');
  if(!list.length){
    wrap.innerHTML='<div class="empty"><i class="ri-wallet-3-line"></i>Nuk ka shpenzime.<br>Shtyp <strong>Shpenzim i Ri</strong> pĂ«r tĂ« filluar.</div>';
    return;
  }
  const rows=list.map(x=>{
    const color=KAT_COLORS[x.kategoria]||'#888';
    const icon=KAT_ICONS[x.kategoria]||'ri-more-line';
    return `<tr>
      <td class="td-nr">${x.data?fmtDate(x.data):'â'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:28px;height:28px;border-radius:7px;background:${color}18;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <i class="${icon}" style="font-size:14px;color:${color}"></i>
          </div>
          <div>
            <div class="td-name">${esc(x.pershkrim||'Pa pĂ«rshkrim')}</div>
            <div class="td-sub">${esc(x.kategoria||'Pa kategori')}</div>
          </div>
        </div>
      </td>
      <td class="td-amt" style="color:var(--accent)">${fmtL(x.shuma)}</td>
      <td><span class="badge badge-menyra">${(x.menyra_pages||'dore')==='banke'?'<i class="ri-bank-line"></i> BankĂ«':'<i class="ri-hand-coin-line"></i> DorĂ«'}</span></td>
      <td>${x.notes?`<span style="font-size:11px;color:var(--muted)">${esc(x.notes)}</span>`:''}</td>
      <td>
        <div style="display:flex;gap:6px;justify-content:flex-end;">
          <button class="btn-icon" onclick="openEdit('${x.id}')"><i class="ri-edit-line"></i></button>
          <button class="btn-icon danger" onclick="askDel('${x.id}')"><i class="ri-delete-bin-line"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');
  wrap.innerHTML=`<table>
    <thead><tr>
      <th class="th-sort" onclick="setSort('data')">Data ${sortCol==='data'?`<span class="sort-arrow">${sortDir==='asc'?'ïżœ?'':'â'}</span>`:'<span class="sort-arrow muted">ïżœ?.</span>'}</th>
      <th class="th-sort" onclick="setSort('pershkrim')">PĂ«rshkrimi / Kategoria ${sortCol==='pershkrim'?`<span class="sort-arrow">${sortDir==='asc'?'ïżœ?'':'â'}</span>`:'<span class="sort-arrow muted">ïżœ?.</span>'}</th>
      <th class="th-sort" onclick="setSort('shuma')">Shuma ${sortCol==='shuma'?`<span class="sort-arrow">${sortDir==='asc'?'ïżœ?'':'â'}</span>`:'<span class="sort-arrow muted">ïżœ?.</span>'}</th>
      <th>MĂ«nyra</th><th>ShĂ«nime</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

/* Delete */
function askDel(id){ deleteId=id; document.getElementById('conf-bd').classList.add('open'); }
function closeConf(){ document.getElementById('conf-bd').classList.remove('open'); deleteId=null; }
function confirmDel(){
  DB.shpenzime=DB.shpenzime.filter(x=>x.id!==deleteId);
  closeConf(); toast('Shpenzimi u fshi.'); renderStats(); renderList();
}

/* Close dropdowns on outside click */
document.addEventListener('click',e=>{
  if(!e.target.closest('.ac-wrap')) document.querySelectorAll('.ac-dd.open').forEach(d=>d.classList.remove('open'));
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeModal(); closeConf(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
    if(document.getElementById('modal-bd').classList.contains('open')) saveShpenzim();
  }
});

DP.onchange = renderList;
renderStats();
renderList();
autoBackup();
</script>
</body>
</html>
