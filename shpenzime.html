<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PASH — Shpenzime</title>
<link href="remixicon/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="pash.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-badge"><i class="ri-line-chart-fill"></i></div>
    <div class="logo-text">PASH<small>Pasqyra Financiare</small></div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="index.html"><i class="ri-dashboard-2-line"></i>Paneli</a>
    <a class="nav-item active" href="shpenzime.html"><i class="ri-wallet-3-line"></i>Shpenzime</a>
    <a class="nav-item" href="blerjet.html"><i class="ri-shopping-bag-line"></i>Blerjet</a>
    <a class="nav-item" href="arka.html"><i class="ri-safe-line"></i>Arka</a>
    <a class="nav-item" href="furnitoret.html"><i class="ri-user-2-line"></i>Furnitorët</a>
    <a class="nav-item" href="zerat.html"><i class="ri-price-tag-3-line"></i>Zërat</a>
  </nav>
  <div class="sidebar-backup">
    <button class="sb-btn" onclick="exportBackup()" title="Shkarko backup JSON"><i class="ri-download-2-line"></i> Backup</button>
    <label class="sb-btn" title="Ngarko backup JSON"><i class="ri-upload-2-line"></i> Restore<input type="file" accept=".json" style="display:none" onchange="importBackup(this.files[0])"></label>
  </div>
  <div class="sidebar-footer">
    <div class="sf-avatar">P</div>
    <div><span class="sf-name">PASH</span><span class="sf-label">Sistemi</span></div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-user">
      <div class="topbar-label">SEKSIONI</div>
      <div class="topbar-name">Shpenzime Operative</div>
    </div>
  </div>
  <div class="content">
    <div class="list-head">
      <div>
        <div class="page-title">Shpenzime</div>
        <div class="page-sub">Kostot operative — paga, qira, utilities, transport dhe të tjera</div>
      </div>
      <button class="btn-primary" onclick="openModal()"><i class="ri-add-line"></i> Shpenzim i Ri</button>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;" id="stats-strip"></div>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
      <div class="search-wrap">
        <i class="ri-search-line"></i>
        <input class="search-input" id="search" placeholder="Kërko shpenzim..." oninput="renderList()">
      </div>
      <select id="filter-kat" onchange="renderList()" style="background:var(--white);border:0.5px solid var(--border);border-radius:7px;padding:8px 12px;font-family:'Switzer',sans-serif;font-size:12px;outline:none;">
        <option value="">Të gjitha kategoritë</option>
        <option>Paga</option><option>Qira</option><option>Utilities</option>
        <option>Transport</option><option>Mirëmbajtje</option>
        <option>Marketing</option><option>Kosto Operative</option><option>Të Tjera</option>
      </select>
      <select id="filter-status" onchange="renderList()" style="background:var(--white);border:0.5px solid var(--border);border-radius:7px;padding:8px 12px;font-family:'Switzer',sans-serif;font-size:12px;outline:none;">
        <option value="">Të gjitha statuset</option>
        <option value="paguar">E Paguar</option>
        <option value="pa_paguar">Pa Paguar</option>
      </select>
      <select id="filter-menyra" onchange="renderList()" style="background:var(--white);border:0.5px solid var(--border);border-radius:7px;padding:8px 12px;font-family:'Switzer',sans-serif;font-size:12px;outline:none;">
        <option value="">Të gjitha mënyrat</option>
        <option value="banke">Me Bankë</option>
        <option value="dore">Në Dorë</option>
      </select>
      <div class="dp-wrap" id="dp-wrap">
        <button class="dp-trigger" id="dp-trigger" onclick="DP.toggle()">
          <i class="ri-calendar-line"></i><span id="dp-label">Të gjithë datat</span>
        </button>
        <div class="dp-popup" id="dp-popup">
          <div class="dp-nav">
            <button class="dp-nav-btn" onclick="DP.nav(-1)">&#9664;</button>
            <button class="dp-title" id="dp-title" onclick="DP.toggleMode()">—</button>
            <button class="dp-nav-btn" onclick="DP.nav(1)">&#9654;</button>
          </div>
          <div id="dp-body"></div>
          <div class="dp-footer">
            <button class="dp-clear" onclick="DP.clear()">Pastro</button>
            <button class="dp-today" onclick="DP.today()">Sot</button>
          </div>
        </div>
      </div>
      <span id="list-total" style="margin-left:auto;font-size:12px;font-weight:600;color:var(--muted);"></span>
    </div>

    <div class="card" id="list-wrap"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     SHPENZIM I RI MODAL
═══════════════════════════════════════════════════════════════ -->
<div class="modal-backdrop" id="modal-bd" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Shpenzim i Ri</h2>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body">

      <!-- Emërtimi / Përshkrimi — fusha kryesore -->
      <div class="field">
        <label>Emërtimi / Përshkrimi <span style="color:var(--accent);font-size:10px;">*</span></label>
        <div class="ac-wrap">
          <input type="text" id="f-pershkrim" autocomplete="off"
            style="background:var(--surface);border:0.5px solid var(--border);border-radius:7px;
                   padding:9px 12px;font-family:'Switzer',sans-serif;font-size:13px;
                   color:var(--text);outline:none;width:100%;transition:border-color .15s"
            placeholder="p.sh. Faturë OSHEE, Paga Maj..."
            oninput="onPershkrimInput(this.value)"
            onfocus="onPershkrimInput(this.value)">
          <div class="ac-dd" id="ac-pershkrim-dd"></div>
        </div>
      </div>

      <!-- Data + Shuma -->
      <div class="field-row">
        <div class="field">
          <label>Data <span style="color:var(--muted);font-size:9px;text-transform:none;letter-spacing:0">(opsional)</span></label>
          <input type="date" id="f-data">
        </div>
        <div class="field">
          <label>Shuma (L) <span style="color:var(--accent);font-size:10px;">*</span></label>
          <input type="number" id="f-shuma" min="0" step="0.01" placeholder="0.00"
            style="font-size:16px;font-weight:600;padding:9px 12px;"
            oninput="this.style.color=parseFloat(this.value)>0?'var(--accent)':'var(--text)'">
        </div>
      </div>

      <!-- Kategoria — autocomplete -->
      <div class="field">
        <label>Kategoria <span style="color:var(--muted);font-size:9px;text-transform:none;letter-spacing:0">(opsional)</span></label>
        <div class="ac-wrap">
          <input type="text" id="f-kat-input" autocomplete="off"
            style="background:var(--surface);border:0.5px solid var(--border);border-radius:7px;
                   padding:9px 12px;font-family:'Switzer',sans-serif;font-size:13px;
                   color:var(--text);outline:none;width:100%;transition:border-color .15s"
            placeholder="Kërko p.sh. 'pag', 'util'..."
            oninput="onKatInput(this.value)"
            onfocus="onKatInput(this.value)">
          <div class="ac-dd" id="ac-kat-dd"></div>
        </div>
      </div>

      <!-- Statusi + Mënyra e pagesës -->
      <div class="field-row">
        <div class="field">
          <label>Statusi i Pagesës <span style="color:var(--muted);font-size:9px;text-transform:none;letter-spacing:0">(opsional)</span></label>
          <div class="status-toggle">
            <button class="status-btn active-paguar" id="btn-paguar" onclick="setStatus('paguar')"><i class="ri-checkbox-circle-line"></i> E Paguar</button>
            <button class="status-btn" id="btn-papag" onclick="setStatus('pa_paguar')"><i class="ri-time-line"></i> Pa Paguar</button>
          </div>
        </div>
        <div class="field">
          <label>Mënyra e Pagesës <span style="color:var(--muted);font-size:9px;text-transform:none;letter-spacing:0">(opsional)</span></label>
          <div class="status-toggle">
            <button class="status-btn" id="btn-banke" onclick="setMenyra('banke')"><i class="ri-bank-line"></i> Me Bankë</button>
            <button class="status-btn active-dore" id="btn-dore" onclick="setMenyra('dore')"><i class="ri-hand-coin-line"></i> Në Dorë</button>
          </div>
        </div>
      </div>

      <!-- Shënime -->
      <div class="field">
        <label>Shënime <span style="color:var(--muted);font-size:9px;text-transform:none;letter-spacing:0">(opsional)</span></label>
        <textarea id="f-notes" placeholder="Detaje shtesë..." style="min-height:52px"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-secondary" onclick="closeModal()">Anulo</button>
      <button class="btn-primary" onclick="saveShpenzim()"><i class="ri-save-line"></i> Ruaj</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="modal-backdrop" id="view-bd" onclick="if(event.target===this)closeView()">
  <div class="modal">
    <div class="modal-head">
      <h2 id="view-title">Historia</h2>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn-secondary" style="padding:6px 12px;font-size:11px;" onclick="editFromView()"><i class="ri-edit-line"></i> Edito</button>
        <button class="modal-close" onclick="closeView()">&#x2715;</button>
      </div>
    </div>
    <div class="modal-body" id="view-body"></div>
  </div>
</div>

<!-- Confirm delete -->
<div class="modal-backdrop confirm-modal" id="conf-bd" onclick="if(event.target===this)closeConf()">
  <div class="modal" style="max-width:360px">
    <div class="modal-head"><h2>Fshi Shpenzimin</h2><button class="modal-close" onclick="closeConf()">&#x2715;</button></div>
    <div class="confirm-body">Jeni të sigurt? Ky veprim nuk mund të kthehet.</div>
    <div class="modal-foot">
      <button class="btn-secondary" onclick="closeConf()">Anulo</button>
      <button class="btn-danger" onclick="confirmDel()">Fshi</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="pash-data.js"></script>
<script>
let editId    = null;
let deleteId  = null;
let payStatus = 'paguar';
let payMenyra = 'dore';
let sortCol   = 'data';
let sortDir   = 'desc';

function setSort(col){
  if(sortCol===col) sortDir = sortDir==='asc'?'desc':'asc';
  else { sortCol=col; sortDir='asc'; }
  renderList();
}

function setStatus(s){
  payStatus = s;
  document.getElementById('btn-paguar').className = 'status-btn' + (s==='paguar'    ? ' active-paguar'    : '');
  document.getElementById('btn-papag').className  = 'status-btn' + (s==='pa_paguar' ? ' active-pa-paguar' : '');
}

function setMenyra(m){
  payMenyra = m;
  document.getElementById('btn-banke').className = 'status-btn' + (m==='banke' ? ' active-banke' : '');
  document.getElementById('btn-dore').className  = 'status-btn' + (m==='dore'  ? ' active-dore'  : '');
}

const ALL_KATS = ['Paga','Qira','Utilities','Transport','Mirëmbajtje','Marketing','Kosto Operative','Të Tjera'];
const KAT_COLORS={'Paga':'#9b45d4','Qira':'#e07b30','Utilities':'#1a9e6e','Transport':'#1a7fc1',
  'Mirëmbajtje':'#c8003e','Marketing':'#4361ee','Kosto Operative':'#888','Të Tjera':'#aaa'};
const KAT_ICONS={'Paga':'ri-group-line','Qira':'ri-building-line','Utilities':'ri-flashlight-line',
  'Transport':'ri-truck-line','Mirëmbajtje':'ri-tools-line','Marketing':'ri-megaphone-line',
  'Kosto Operative':'ri-settings-line','Të Tjera':'ri-more-line'};

function hlSearch(text,q){
  if(!q) return esc(text);
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return esc(text);
  return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
}

/* ── Autocomplete: kategoria ─────────────────────────────────── */
function onKatInput(q){
  const dd=document.getElementById('ac-kat-dd');
  const ql=q.toLowerCase().trim();
  const usedKats=[...new Set(DB.shpenzime.map(x=>x.kategoria).filter(Boolean))];
  const allKats=[...new Set([...ALL_KATS,...usedKats])];
  const matches=ql?allKats.filter(k=>k.toLowerCase().includes(ql)):allKats;
  if(!matches.length&&!ql){ dd.classList.remove('open'); return; }
  let html='<div class="ac-group">Kategoritë</div>';
  html+=matches.slice(0,10).map(k=>{
    const col=KAT_COLORS[k]||'#888';
    const ico=KAT_ICONS[k]||'ri-more-line';
    return `<div class="ac-opt" data-val="${esc(k)}">
      <i class="${ico}" style="color:${col};margin-right:7px"></i>${hlSearch(k,q)}
    </div>`;
  }).join('');
  if(ql&&!allKats.some(k=>k.toLowerCase()===ql)){
    html+=`<div class="ac-opt new-item" data-val="${esc(q)}">
      <i class="ri-add-circle-line" style="margin-right:6px"></i>Shto kategori "${esc(q)}"
    </div>`;
  }
  dd.innerHTML=html; dd.classList.add('open');
  dd.querySelectorAll('.ac-opt').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      e.preventDefault();
      document.getElementById('f-kat-input').value=el.dataset.val;
      dd.classList.remove('open');
    });
  });
}

/* ── Autocomplete: përshkrimi nga historia ───────────────────── */
function onPershkrimInput(q){
  const dd=document.getElementById('ac-pershkrim-dd');
  const ql=q.toLowerCase().trim();
  if(!ql){ dd.classList.remove('open'); return; }
  const prev=[...new Set(DB.shpenzime.map(x=>x.pershkrim).filter(Boolean))];
  const matches=prev.filter(p=>p.toLowerCase().includes(ql));
  if(!matches.length){ dd.classList.remove('open'); return; }
  let html='<div class="ac-group">Nga historia</div>';
  html+=matches.slice(0,6).map(p=>`<div class="ac-opt" data-val="${esc(p)}">${hlSearch(p,q)}</div>`).join('');
  dd.innerHTML=html; dd.classList.add('open');
  dd.querySelectorAll('.ac-opt').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      e.preventDefault();
      document.getElementById('f-pershkrim').value=el.dataset.val;
      dd.classList.remove('open');
    });
  });
}

/* ── Modal ───────────────────────────────────────────────────── */
function openModal(){
  editId=null;
  document.getElementById('modal-title').textContent='Shpenzim i Ri';
  document.getElementById('f-pershkrim').value='';
  document.getElementById('f-shuma').value='';
  document.getElementById('f-shuma').style.color='var(--text)';
  document.getElementById('f-kat-input').value='';
  document.getElementById('f-data').value=todayISO();
  document.getElementById('f-notes').value='';
  setStatus('paguar');
  setMenyra('dore');
  document.getElementById('modal-bd').classList.add('open');
  setTimeout(()=>document.getElementById('f-pershkrim').focus(),80);
}

function openEdit(id){
  const x=DB.shpenzime.find(s=>s.id===id); if(!x) return;
  editId=id;
  document.getElementById('modal-title').textContent='Edito Shpenzimin';
  document.getElementById('f-pershkrim').value=x.pershkrim||'';
  document.getElementById('f-shuma').value=x.shuma||'';
  document.getElementById('f-shuma').style.color=x.shuma?'var(--accent)':'var(--text)';
  document.getElementById('f-kat-input').value=x.kategoria||'';
  document.getElementById('f-data').value=x.data||'';
  document.getElementById('f-notes').value=x.notes||'';
  setStatus(x.statusi||'paguar');
  setMenyra(x.menyra_pages||'dore');
  document.getElementById('modal-bd').classList.add('open');
}

function closeModal(){ document.getElementById('modal-bd').classList.remove('open'); editId=null; }

function saveShpenzim(){
  const pershkrim=document.getElementById('f-pershkrim').value.trim();
  if(!pershkrim){ toast('Shkruaj emërtimin — e detyrueshme.'); document.getElementById('f-pershkrim').focus(); return; }
  const shuma=parseFloat(document.getElementById('f-shuma').value)||0;
  if(shuma<=0){ toast('Vendos shumën — e detyrueshme.'); document.getElementById('f-shuma').focus(); return; }

  const kategoria=document.getElementById('f-kat-input').value.trim()||'Pa kategori';
  const data=document.getElementById('f-data').value||todayISO();
  const notes=document.getElementById('f-notes').value.trim();

  let list=DB.shpenzime;
  if(editId){
    const idx=list.findIndex(x=>x.id===editId);
    if(idx>=0) list[idx]={...list[idx],pershkrim,kategoria,data,shuma,statusi:payStatus,menyra_pages:payMenyra,notes};
    toast('Shpenzimi u përditësua.');
  } else {
    list.push({id:genId(),pershkrim,kategoria,data,shuma,statusi:payStatus,menyra_pages:payMenyra,notes,created:new Date().toISOString()});
    toast('Shpenzimi u shtua.');
  }
  DB.shpenzime=list;
  closeModal(); renderStats(); renderList();
}

/* ── List ────────────────────────────────────────────────────── */
function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  const kat=document.getElementById('filter-kat').value;
  const status=document.getElementById('filter-status').value;
  const menyra=document.getElementById('filter-menyra').value;
  let list=DB.shpenzime.filter(x=>{
    if(kat&&x.kategoria!==kat) return false;
    if(status&&(x.statusi||'paguar')!==status) return false;
    if(menyra&&(x.menyra_pages||'dore')!==menyra) return false;
    if(!DP.matches(x.data)) return false;
    if(q&&!(x.pershkrim||'').toLowerCase().includes(q)&&!(x.kategoria||'').toLowerCase().includes(q)) return false;
    return true;
  });
  if(sortCol==='data')      list.sort((a,b)=>{const da=new Date(a.data||a.created||0),db=new Date(b.data||b.created||0);return sortDir==='asc'?da-db:db-da;});
  else if(sortCol==='emertimi') list.sort((a,b)=>{const na=(a.pershkrim||'').toLowerCase(),nb=(b.pershkrim||'').toLowerCase();return sortDir==='asc'?na.localeCompare(nb):nb.localeCompare(na);});
  else if(sortCol==='shuma') list.sort((a,b)=>sortDir==='asc'?(a.shuma||0)-(b.shuma||0):(b.shuma||0)-(a.shuma||0));

  const total=list.reduce((s,x)=>s+(x.shuma||0),0);
  const papaguar=list.filter(x=>x.statusi==='pa_paguar').reduce((s,x)=>s+(x.shuma||0),0);
  const paguar=list.filter(x=>x.statusi!=='pa_paguar').reduce((s,x)=>s+(x.shuma||0),0);
  const bycat={}; list.forEach(x=>{bycat[x.kategoria]=(bycat[x.kategoria]||0)+(x.shuma||0);});
  const topCat=Object.entries(bycat).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stats-strip').innerHTML=`
    <div class="period-card"><div class="pc-header"><div class="pc-icon red"><i class="ri-wallet-3-line"></i></div><span class="pc-label">Totali Filtruar</span></div><div class="pc-val red">${fmtL(total)}</div></div>
    <div class="period-card"><div class="pc-header"><div class="pc-icon green"><i class="ri-checkbox-circle-line"></i></div><span class="pc-label">E Paguar</span></div><div class="pc-val">${fmtL(paguar)}</div></div>
    <div class="period-card"><div class="pc-header"><div class="pc-icon orange"><i class="ri-time-line"></i></div><span class="pc-label">Pa Paguar</span></div><div class="pc-val ${papaguar>0?'red':''}">${fmtL(papaguar)}</div></div>
    <div class="period-card"><div class="pc-header"><div class="pc-icon blue"><i class="ri-price-tag-3-line"></i></div><span class="pc-label">Kategoria Kryesore</span></div><div class="pc-val" style="font-size:14px">${topCat?esc(topCat[0]):'—'}</div></div>`;
  document.getElementById('list-total').textContent=`${list.length} rekorde · ${fmtL(total)}`;

  const wrap=document.getElementById('list-wrap');
  if(!list.length){
    wrap.innerHTML='<div class="empty"><i class="ri-wallet-3-line"></i>Nuk ka shpenzime.<br>Shtyp <strong>Shpenzim i Ri</strong> për të filluar.</div>';
    return;
  }

  const si=(col)=>sortCol===col?`<span class="sort-arrow">${sortDir==='asc'?'↑':'↓'}</span>`:'<span class="sort-arrow muted">↕</span>';

  const rows=list.map(x=>{
    const color=KAT_COLORS[x.kategoria]||'#888';
    const icon=KAT_ICONS[x.kategoria]||'ri-more-line';
    const st=x.statusi==='paguar'||!x.statusi;
    return `<tr onclick="openView('${x.id}')" style="cursor:pointer;">
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:30px;height:30px;border-radius:7px;background:${color}18;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <i class="${icon}" style="font-size:14px;color:${color}"></i>
          </div>
          <div>
            <div class="td-name">${esc(x.pershkrim||'Pa përshkrim')}</div>
            <div class="td-sub">${esc(x.kategoria||'Pa kategori')}</div>
          </div>
        </div>
      </td>
      <td>${x.data?fmtDate(x.data):'—'}</td>
      <td class="td-amt" style="color:var(--accent)">${fmtL(x.shuma)}</td>
      <td>
        <span class="badge ${st?'paguar':'pa-paguar'}">${st?'E Paguar':'Pa Paguar'}</span>
      </td>
      <td>
        <span class="badge badge-menyra">${(x.menyra_pages||'dore')==='banke'?'<i class="ri-bank-line"></i> Bankë':'<i class="ri-hand-coin-line"></i> Dorë'}</span>
      </td>
      <td onclick="event.stopPropagation()">
        <div style="display:flex;gap:6px;justify-content:flex-end;">
          <button class="btn-icon" onclick="openEdit('${x.id}')"><i class="ri-edit-line"></i></button>
          <button class="btn-icon danger" onclick="askDel('${x.id}')"><i class="ri-delete-bin-line"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');

  wrap.innerHTML=`<table>
    <thead><tr>
      <th class="th-sort" onclick="setSort('emertimi')">Emërtimi / Kategoria ${si('emertimi')}</th>
      <th class="th-sort" onclick="setSort('data')">Data ${si('data')}</th>
      <th class="th-sort" onclick="setSort('shuma')">Totali ${si('shuma')}</th>
      <th>Statusi</th>
      <th>Mënyra</th>
      <th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

/* ── View ────────────────────────────────────────────────────── */
let viewId = null;

function openView(id){
  const x = DB.shpenzime.find(s=>s.id===id); if(!x) return;
  viewId = id;
  const kat   = x.kategoria || 'Pa kategori';
  const color = KAT_COLORS[kat]||'#888';
  const icon  = KAT_ICONS[kat]||'ri-more-line';

  /* All entries with same category */
  const historia = DB.shpenzime
    .filter(s=>(s.kategoria||'Pa kategori')===kat)
    .sort((a,b)=>new Date(b.data)-new Date(a.data));

  const totalHistoria  = historia.reduce((s,h)=>s+(h.shuma||0),0);
  const papaguarTotal  = historia.filter(h=>h.statusi==='pa_paguar').reduce((s,h)=>s+(h.shuma||0),0);

  const rows = historia.map(h=>{
    const st = h.statusi==='paguar'||!h.statusi;
    const isCurrent = h.id===id;
    return `<tr style="${isCurrent?'background:var(--surface);':''}">
      <td>
        <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(h.pershkrim||'Pa përshkrim')}</div>
        <div style="font-size:11px;color:var(--muted)">${h.data?fmtDate(h.data):'—'}</div>
      </td>
      <td class="td-amt" style="color:var(--accent);font-weight:700">${fmtL(h.shuma)}</td>
      <td><span class="badge ${st?'paguar':'pa-paguar'}">${st?'E Paguar':'Pa Paguar'}</span></td>
      <td><span class="badge badge-menyra">${(h.menyra_pages||'dore')==='banke'?'<i class="ri-bank-line"></i> Bankë':'<i class="ri-hand-coin-line"></i> Dorë'}</span></td>
      <td onclick="event.stopPropagation()">
        <div style="display:flex;gap:5px;justify-content:flex-end;">
          <button class="btn-icon" onclick="closeView();openEdit('${h.id}')"><i class="ri-edit-line"></i></button>
          <button class="btn-icon danger" onclick="closeView();askDel('${h.id}')"><i class="ri-delete-bin-line"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('view-title').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:34px;height:34px;border-radius:8px;background:${color}20;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <i class="${icon}" style="font-size:16px;color:${color}"></i>
      </div>
      <div>
        <div style="font-size:15px;font-weight:700">${esc(kat)}</div>
        <div style="font-size:11px;font-weight:400;color:var(--muted);margin-top:1px">${historia.length} veprime</div>
      </div>
    </div>`;

  document.getElementById('view-body').innerHTML = `
    ${papaguarTotal>0?`<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:9px 13px;font-size:12px;color:#856404;margin-bottom:12px;display:flex;align-items:center;gap:7px;"><i class="ri-time-line"></i> Pa paguar: <strong>${fmtL(papaguarTotal)}</strong></div>`:''}
    <table style="width:100%">
      <thead><tr>
        <th style="text-align:left;padding:8px 10px;font-size:10px;letter-spacing:1px;color:var(--muted);font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border)">Emërtimi / Data</th>
        <th style="text-align:left;padding:8px 10px;font-size:10px;letter-spacing:1px;color:var(--muted);font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border)">Shuma</th>
        <th style="text-align:left;padding:8px 10px;font-size:10px;letter-spacing:1px;color:var(--muted);font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border)">Statusi</th>
        <th style="text-align:left;padding:8px 10px;font-size:10px;letter-spacing:1px;color:var(--muted);font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border)">Mënyra</th>
        <th style="border-bottom:1px solid var(--border)"></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="grand-total" style="margin-top:12px;">
      <span class="grand-total-lbl">TOTALI (${historia.length} veprime)</span>
      <span class="grand-total-val">${fmtL(totalHistoria)}</span>
    </div>`;

  document.getElementById('view-bd').classList.add('open');
}

function closeView(){ document.getElementById('view-bd').classList.remove('open'); viewId=null; }
function editFromView(){ const id=viewId; closeView(); openEdit(id); }

/* Delete */
function askDel(id){ deleteId=id; document.getElementById('conf-bd').classList.add('open'); }
function closeConf(){ document.getElementById('conf-bd').classList.remove('open'); deleteId=null; }
function confirmDel(){
  DB.shpenzime=DB.shpenzime.filter(x=>x.id!==deleteId);
  closeConf(); toast('Shpenzimi u fshi.'); renderStats(); renderList();
}

/* Close dropdowns on outside click */
document.addEventListener('click',e=>{
  if(!e.target.closest('.ac-wrap')) document.querySelectorAll('.ac-dd.open').forEach(d=>d.classList.remove('open'));
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeModal(); closeView(); closeConf(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
    if(document.getElementById('modal-bd').classList.contains('open')) saveShpenzim();
  }
});

DP.onchange = renderList;
renderList();
autoBackup();
</script>
</body>
</html>
